# Minimal nginx config for Let's Encrypt bootstrap only.
# No proxy_pass directives — backends don't need to be running.
server {
    listen 80;
    server_name minuto90.site www.minuto90.site _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
