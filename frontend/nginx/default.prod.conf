# =============================================================================
# Nginx — Production config for minuto90.site
# HTTP: serves ACME challenge, redirects everything else to HTTPS
# HTTPS: TLS termination + reverse proxy to microservices
# =============================================================================

# ── HTTP: challenge + redirect ────────────────────────────────────────────────
server {
    listen 80;
    server_name minuto90.site www.minuto90.site;

    # Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name minuto90.site www.minuto90.site;

    ssl_certificate     /etc/letsencrypt/live/minuto90.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minuto90.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "SAMEORIGIN"                                   always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-XSS-Protection          "1; mode=block"                                always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;
    add_header Cache-Control             "no-store";

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Proxy timeouts (generous for batch scoring operations)
    proxy_connect_timeout 90s;
    proxy_send_timeout    90s;
    proxy_read_timeout    90s;
    proxy_http_version    1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API proxies ────────────────────────────────────────────────────────────

    location /api/auth/ {
        proxy_pass http://worldcup-auth-service:3001;
    }

    location /api/matches {
        proxy_pass http://worldcup-matches-service:3002;
    }

    location /api/admin/matches {
        proxy_pass http://worldcup-matches-service:3002;
    }

    location /api/admin/leaderboard {
        proxy_pass http://worldcup-predictions-service:3003;
    }

    location /api/admin/bonus {
        proxy_pass http://worldcup-predictions-service:3003;
    }

    location /api/bonus {
        proxy_pass http://worldcup-predictions-service:3003;
    }

    location /api/predictions {
        proxy_pass http://worldcup-predictions-service:3003;
    }

    location /api/leaderboard {
        proxy_pass http://worldcup-predictions-service:3003;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
