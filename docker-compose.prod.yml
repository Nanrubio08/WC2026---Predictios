# =============================================================================
# Polla Mundialista — Production Compose
# Usage:
#   First deploy:  ./init-letsencrypt.sh
#   After that:    docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

networks:
  worldcup-net:
    driver: bridge

services:
  # ─── Backend Services ───────────────────────────────────────────────────────

  worldcup-auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    container_name: worldcup-auth-service
    env_file: .env
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${AUTH_SERVICE_PORT:-3001}
      PREDICTIONS_SERVICE_URL: ${PREDICTIONS_SERVICE_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    expose:
      - "${AUTH_SERVICE_PORT:-3001}"
    networks:
      - worldcup-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${AUTH_SERVICE_PORT:-3001}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worldcup-matches-service:
    build:
      context: ./backend/matches-service
      dockerfile: Dockerfile
    container_name: worldcup-matches-service
    env_file: .env
    environment:
      DATABASE_URL: ${MATCHES_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${MATCHES_SERVICE_PORT:-3002}
      PREDICTIONS_SERVICE_URL: ${PREDICTIONS_SERVICE_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY}
      FOOTBALL_COMPETITION: ${FOOTBALL_COMPETITION:-WC}
      FOOTBALL_SEASON: ${FOOTBALL_SEASON:-2026}
    expose:
      - "${MATCHES_SERVICE_PORT:-3002}"
    networks:
      - worldcup-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${MATCHES_SERVICE_PORT:-3002}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  worldcup-predictions-service:
    build:
      context: ./backend/predictions-service
      dockerfile: Dockerfile
    container_name: worldcup-predictions-service
    env_file: .env
    environment:
      DATABASE_URL: ${PREDICTIONS_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PREDICTIONS_SERVICE_PORT:-3003}
      MATCHES_SERVICE_URL: ${MATCHES_SERVICE_URL}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN}
    expose:
      - "${PREDICTIONS_SERVICE_PORT:-3003}"
    networks:
      - worldcup-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${PREDICTIONS_SERVICE_PORT:-3003}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Frontend + Nginx (TLS termination) ────────────────────────────────────

  worldcup-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: worldcup-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      worldcup-auth-service:
        condition: service_healthy
      worldcup-matches-service:
        condition: service_healthy
      worldcup-predictions-service:
        condition: service_healthy
    networks:
      - worldcup-net
    restart: unless-stopped
    # Reload nginx every 6h to pick up renewed certs
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  # ─── Certbot (auto-renew every 12h) ────────────────────────────────────────

  certbot:
    image: certbot/certbot
    container_name: worldcup-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Attempt renewal every 12h; certbot skips if cert is not due yet
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;"
    restart: unless-stopped
